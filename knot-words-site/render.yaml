services:
  - type: web
    name: knot-words
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: ANTHROPIC_VERSION
        value: 2023-06-01
      - key: ANTHROPIC_MAX_TOKENS
        value: "1400"
